name: publish-npm

# Publishes kijito-claude to npm using Trusted Publishing (OIDC) — no NPM_TOKEN stored;
# npm exchanges a short-lived workflow credential and attaches provenance automatically.
#
# v0.1.0 was published manually (npm can't OIDC-publish a brand-new package). For this tag
# trigger to work on future releases, configure the trusted publisher once on npmjs.com:
# package page -> Settings -> Trusted Publisher -> this repo (KijitoAI/kijito-claude) +
# workflow file publish-npm.yml. Until that's set, a v* tag will fail the npm job; the PyPI
# job is independent and unaffected.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  id-token: write   # required for Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"        # Trusted Publishing needs Node >=22.14 on the runner
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm publish --access public
