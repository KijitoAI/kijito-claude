name: publish-npm

# Publishes kijito-claude to npm using Trusted Publishing (OIDC) — no NPM_TOKEN stored;
# npm exchanges a short-lived workflow credential and attaches provenance automatically.
#
# MANUAL-ONLY until the package exists: npm cannot publish a brand-new package via trusted
# publishing — the package must already exist before you can attach a trusted publisher. So
# the FIRST publish is a one-time local `npm publish --access public` (with 2FA). After that,
# configure the trusted publisher (npmjs.com -> package -> Settings -> Trusted Publisher ->
# this repo + workflow) and re-enable the tag trigger below for future releases:
#   on:
#     push:
#       tags: ["v*"]
on:
  workflow_dispatch:

permissions:
  id-token: write   # required for Trusted Publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"        # Trusted Publishing needs Node >=22.14 on the runner
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm publish --access public
